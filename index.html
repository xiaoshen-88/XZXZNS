<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>鑫质信智能锁图册</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-overflow-scrolling:touch}
    html,body{width:100vw;height:100vh;overflow:hidden !important;position:fixed;background:#1a1a1a;font-family:system-ui,sans-serif}
    .loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;z-index:9999}
    .loading-circle{width:44px;height:44px;border:3px solid #444;border-top:3px solid #fff;border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="loading-circle"></div></div>
  <div id="container"></div>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.worker.min.js";
    window.sendvisitinfo = ()=>{};
  </script>

  <script src="javascript/config.js" defer></script>
  <script src="javascript/LoadingJS.js" defer></script>
  <script src="javascript/resource_skeleton.js" defer></script>
  <script src="javascript/editor.js" defer></script>
  <script src="javascript/BookPreview.js" defer></script>
  <script src="files/search/book_config.js" defer></script>

  <script>setTimeout(()=>{document.getElementById('loading').style.display='none'},2800)</script>
  <noscript style="color:#fff;text-align:center;padding:30px">请开启JS查看</noscript>
</body>
</html>
